<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Outer circle background -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)"/>

  <!-- Radial circuit ring - top arc dots and lines -->
  <g opacity="0.55" stroke="#8a6448" stroke-width="1.2">
    <!-- Top arc segments -->
    <line x1="200" y1="30" x2="200" y2="14"/>
    <circle cx="200" cy="12" r="2.5" fill="#8a6448"/>

    <line x1="231" y1="33" x2="237" y2="18"/>
    <circle cx="238" cy="16" r="2.5" fill="#8a6448"/>

    <line x1="261" y1="42" x2="272" y2="28"/>
    <circle cx="274" cy="26" r="2.5" fill="#8a6448"/>

    <line x1="288" y1="57" x2="302" y2="46"/>
    <circle cx="304" cy="44" r="2" fill="#c4a882"/>

    <line x1="311" y1="77" x2="327" y2="68"/>
    <circle cx="329" cy="67" r="2" fill="#c4a882"/>

    <line x1="328" y1="101" x2="346" y2="95"/>
    <circle cx="348" cy="94" r="2.5" fill="#8a6448"/>

    <line x1="340" y1="128" x2="358" y2="124"/>
    <circle cx="360" cy="123" r="2" fill="#c4a882"/>

    <line x1="346" y1="156" x2="365" y2="154"/>
    <circle cx="367" cy="154" r="2" fill="#c4a882"/>

    <!-- Left arc -->
    <line x1="169" y1="33" x2="163" y2="18"/>
    <circle cx="162" cy="16" r="2.5" fill="#8a6448"/>

    <line x1="139" y1="42" x2="128" y2="28"/>
    <circle cx="126" cy="26" r="2.5" fill="#8a6448"/>

    <line x1="112" y1="57" x2="98" y2="46"/>
    <circle cx="96" cy="44" r="2" fill="#c4a882"/>

    <line x1="89" y1="77" x2="73" y2="68"/>
    <circle cx="71" cy="67" r="2" fill="#c4a882"/>

    <line x1="72" y1="101" x2="54" y2="95"/>
    <circle cx="52" cy="94" r="2.5" fill="#8a6448"/>

    <line x1="60" y1="128" x2="42" y2="124"/>
    <circle cx="40" cy="123" r="2" fill="#c4a882"/>

    <line x1="54" y1="156" x2="35" y2="154"/>
    <circle cx="33" cy="154" r="2" fill="#c4a882"/>

    <!-- Bottom arc -->
    <line x1="200" y1="370" x2="200" y2="386"/>
    <circle cx="200" cy="388" r="2.5" fill="#8a6448"/>

    <line x1="231" y1="367" x2="237" y2="382"/>
    <circle cx="238" cy="384" r="2" fill="#c4a882"/>

    <line x1="261" y1="358" x2="272" y2="372"/>
    <circle cx="274" cy="374" r="2.5" fill="#8a6448"/>

    <line x1="169" y1="367" x2="163" y2="382"/>
    <circle cx="162" cy="384" r="2" fill="#c4a882"/>

    <line x1="139" y1="358" x2="128" y2="372"/>
    <circle cx="126" cy="374" r="2.5" fill="#8a6448"/>
  </g>

  <!-- Small circuit rectangles scattered on ring -->
  <g opacity="0.4" fill="none" stroke="#8a6448" stroke-width="1">
    <rect x="186" y="16" width="10" height="7" rx="1.5"/>
    <rect x="254" y="30" width="8" height="5" rx="1"/>
    <rect x="318" y="72" width="9" height="6" rx="1"/>
    <rect x="350" y="138" width="8" height="5" rx="1"/>
    <rect x="108" y="30" width="8" height="5" rx="1"/>
    <rect x="45" y="72" width="9" height="6" rx="1"/>
    <rect x="18" y="138" width="8" height="5" rx="1"/>
    <rect x="186" y="376" width="10" height="7" rx="1.5"/>
    <rect x="254" y="365" width="8" height="5" rx="1"/>
    <rect x="108" y="365" width="8" height="5" rx="1"/>
  </g>

  <!-- Central C lettermark with circuit style -->
  <g transform="translate(200,185)">
    <!-- Vertical bar left of C -->
    <line x1="-42" y1="-44" x2="-42" y2="44" stroke="#221a14" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-42" cy="-44" r="4" fill="#8a6448"/>
    <circle cx="-42" cy="44" r="4" fill="#8a6448"/>
    <!-- Horizontal connectors -->
    <line x1="-42" y1="-28" x2="-30" y2="-28" stroke="#221a14" stroke-width="4" stroke-linecap="round"/>
    <line x1="-42" y1="28" x2="-30" y2="28" stroke="#221a14" stroke-width="4" stroke-linecap="round"/>
    <!-- C arc top -->
    <path d="M-28,-28 L24,-28 Q42,-28 42,-10" stroke="#221a14" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- C arc bottom -->
    <path d="M-28,28 L24,28 Q42,28 42,10" stroke="#221a14" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Small node on C ends -->
    <circle cx="42" cy="-10" r="3.5" fill="#8a6448"/>
    <circle cx="42" cy="10" r="3.5" fill="#8a6448"/>
    <!-- AI badge -->
    <g transform="translate(14,-8)">
      <rect x="-14" y="-11" width="28" height="22" rx="5" fill="#8a6448" opacity="0.15" stroke="#8a6448" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Space Grotesk', Arial, sans-serif" font-size="10" font-weight="700" fill="#8a6448" letter-spacing="0.05em">AI</text>
    </g>
  </g>

  <!-- CROLIA wordmark -->
  <text x="200" y="268" text-anchor="middle"
    font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif"
    font-size="36" font-weight="700" letter-spacing="0.14em"
    fill="#221a14">CROLIA</text>

  <!-- AI SOLUTIONS subtext -->
  <text x="200" y="293" text-anchor="middle"
    font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif"
    font-size="11" font-weight="500" letter-spacing="0.32em"
    fill="#8a6448">| AI SOLUTIONS |</text>

  <!-- Defs -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f9f4ed"/>
      <stop offset="55%" stop-color="#f0e6d8"/>
      <stop offset="100%" stop-color="#e4d0bc"/>
    </radialGradient>
  </defs>
</svg>
