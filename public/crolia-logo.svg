<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" fill="none">

  <!-- Líneas externas -->
  <line x1="250" y1="88"  x2="148" y2="242" stroke="#8a6448" stroke-width="8.5" stroke-linecap="round"/>
  <line x1="250" y1="88"  x2="352" y2="242" stroke="#8a6448" stroke-width="8.5" stroke-linecap="round"/>
  <line x1="148" y1="242" x2="250" y2="282" stroke="#8a6448" stroke-width="8.5" stroke-linecap="round"/>
  <line x1="352" y1="242" x2="250" y2="282" stroke="#8a6448" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Líneas internas al centro -->
  <line x1="250" y1="88"  x2="250" y2="210" stroke="#8a6448" stroke-width="8.5" stroke-linecap="round"/>
  <line x1="148" y1="242" x2="250" y2="210" stroke="#8a6448" stroke-width="8.5" stroke-linecap="round"/>
  <line x1="352" y1="242" x2="250" y2="210" stroke="#8a6448" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Llama invertida en el centro -->
  <path d="M 250,178 C 240,192 238,210 250,222 C 262,210 260,192 250,178 Z" fill="#8a6448"/>
  <path d="M 250,182 C 244,193 243,205 250,212 C 257,205 256,193 250,182 Z" fill="#c4a882"/>

  <!-- 4 Nodos -->
  <circle cx="250" cy="88"  r="13" fill="#8a6448"/>
  <circle cx="148" cy="242" r="13" fill="#8a6448"/>
  <circle cx="352" cy="242" r="13" fill="#8a6448"/>
  <circle cx="250" cy="282" r="13" fill="#8a6448"/>

  <!-- CROLIA wordmark -->
  <text x="250" y="378"
    text-anchor="middle"
    font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif"
    font-size="74" font-weight="700" letter-spacing="0.1em"
    fill="#221a14">CROLIA</text>

  <!-- AI SOLUTIONS -->
  <text x="250" y="413"
    text-anchor="middle"
    font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif"
    font-size="13.5" font-weight="500" letter-spacing="0.3em"
